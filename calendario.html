<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario · MapFI</title>
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <a href="index.html" class="brand">🗺️ MapFI</a>
      <nav>
        <a href="calendario.html">Calendario</a>
        <a href="mapa-calor.html">Mapa de calor</a>
        <a href="match.html" class="auth-only" hidden>Match</a>
        <a href="dashboard.html" class="auth-only" hidden>Mi panel</a>
        <a href="login.html" class="guest-only">Ingresar</a>
        <span id="user-slot" class="auth-only muted" hidden></span>
        <button class="btn secondary" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h1>Calendario centralizado</h1>
      <div class="card">
        <div class="grid cols-3">
          <div><label>Carrera</label><select id="fCarrera" class="filtro"></select></div>
          <div><label>Generación / año</label><select id="fNivel" class="filtro"></select></div>
          <div><label>Entidad</label><select id="fEntidad" class="filtro"></select></div>
        </div>
      </div>
      <div id="calendar" style="margin-top:16px"><div class="placeholder">Cargando…</div></div>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/ui-toast.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/app-boot.js"></script>
  <script src="js/filters.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales-all.global.min.js"></script>
  <script src="js/calendar-view.js"></script>
  <script>
    (async function () {
      const cat = await Filters.cargar();
      Filters.poblarSelect(document.getElementById("fCarrera"), cat.carreras, "id", "nombre", "Todas las carreras");
      Filters.poblarSelect(document.getElementById("fNivel"), cat.generaciones, "nivel", "etiqueta", "Todos los años");
      Filters.poblarSelect(document.getElementById("fEntidad"), cat.entidades, "id", "nombre", "Todas las entidades");
      const cal = document.getElementById("calendar");
      function render() {
        const filtros = {};
        const c = document.getElementById("fCarrera").value; if (c) filtros.carreraId = c;
        const n = document.getElementById("fNivel").value;   if (n) filtros.nivel = n;
        const e = document.getElementById("fEntidad").value; if (e) filtros.entidadId = e;
        CalendarView.montar(cal, filtros);
      }
      document.querySelectorAll(".filtro").forEach((s) => s.addEventListener("change", render));
      render();
    })();
  </script>
</body>
</html>
