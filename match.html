<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculador de Match · MapFI</title>
  <link rel="icon" href="img/udec_FI.svg" />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>
  <main class="container">
    <section class="section guest-only" hidden>
      <div class="placeholder">Debes <a href="login.html">iniciar sesión</a> para usar el calculador.</div>
    </section>

    <section class="section auth-only" hidden>
      <h1><span class="icon title-icon" data-icon="target"></span> Calculador de compatibilidad y alcance</h1>
      <p class="muted">Propón una fecha y un público objetivo para evaluar la viabilidad.</p>
      <div class="grid cols-2">
        <div class="card">
          <form id="matchForm">
            <label>Inicio</label>
            <input type="datetime-local" name="inicio" required />
            <label>Fin</label>
            <input type="datetime-local" name="fin" />
            <label>Carrera</label>
            <select name="carreraId" id="mCarrera" required></select>
            <label>Generación / año</label>
            <select name="nivel" id="mNivel" required></select>
            <button class="btn" type="submit" style="width:100%"><span class="icon" data-icon="target"></span> Evaluar</button>
          </form>
        </div>
        <div id="resultado"><div class="placeholder">El resultado aparecerá aquí.</div></div>
      </div>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/ui-toast.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app-boot.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/match-calculator.js"></script>
  <script>
    (async function () {
      const cat = await Filters.cargar();
      Filters.poblarSelect(document.getElementById("mCarrera"), cat.carreras, "id", "nombre");
      Filters.poblarSelect(document.getElementById("mNivel"), cat.generaciones, "nivel", "etiqueta");
      document.getElementById("matchForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const r = await MatchCalculator.evaluar(e.target);
          MatchCalculator.render(document.getElementById("resultado"), r);
        } catch (err) {
          toast(err.message || "No se pudo evaluar", "error");
        }
      });
    })();
  </script>
</body>
</html>
