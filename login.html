<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar · MapFI</title>
  <link rel="icon" href="img/udec_FI.svg" />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>
  <main class="container">
    <section class="section" style="max-width:430px;margin:40px auto">
      <div class="card">
        <h1>Iniciar sesión</h1>
        <p class="muted">Acceso para centros de estudiantes, Vinculación y Gearbox.</p>
        <form id="loginForm">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
          <button class="btn" type="submit" style="width:100%"><span class="icon" data-icon="key"></span> Entrar</button>
        </form>
      </div>
      <p class="muted center" style="margin-top:16px">¿Sin cuenta? Solicítala al administrador de MapFI.</p>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/ui-toast.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app-boot.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = e.target;
      try {
        await api.post("/api/auth/login", { email: f.email.value, password: f.password.value });
        location.href = "dashboard.html";
      } catch (err) {
        toast(err.message || "No se pudo iniciar sesión", "error");
      }
    });
  </script>
</body>
</html>
