<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi panel · MapFI</title>
  <link rel="icon" href="img/udec_FI.svg" />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>
  <main class="container">
    <section class="section guest-only" hidden>
      <div class="placeholder">Debes <a href="login.html">iniciar sesión</a> para acceder a tu panel.</div>
    </section>

    <section class="section auth-only" hidden>
      <div class="row" style="justify-content:space-between">
        <h1><span class="icon title-icon" data-icon="layout-dashboard"></span> Mi panel</h1>
        <button class="btn" id="btnNueva"><span class="icon" data-icon="clipboard-list"></span> Nueva actividad</button>
      </div>

      <div class="card" id="formCard" hidden style="margin-top:16px">
        <h2>Nueva actividad</h2>
        <form id="actForm">
          <div class="grid cols-2">
            <div><label>Título</label><input name="titulo" required /></div>
            <div><label>Tipo</label>
              <select name="tipo" required>
                <option value="EVENTO">Evento</option>
                <option value="HITO_ACADEMICO">Hito académico</option>
                <option value="EXTRAPROGRAMATICA">Extraprogramática</option>
                <option value="EXAMEN">Examen</option>
              </select>
            </div>
            <div><label>Inicio</label><input type="datetime-local" name="fechaInicio" required /></div>
            <div><label>Fin</label><input type="datetime-local" name="fechaFin" required /></div>
            <div><label>Carrera (público objetivo)</label><select name="carreraId" id="aCarrera" required></select></div>
            <div><label>Año (público objetivo)</label><select name="nivel" id="aNivel" required></select></div>
          </div>
          <label>Ubicación</label><input name="ubicacion" />
          <label>Descripción</label><textarea name="descripcion" rows="2"></textarea>
          <div class="row">
            <button class="btn" type="submit"><span class="icon" data-icon="save"></span> Guardar</button>
            <button class="btn secondary" type="button" id="btnPreview"><span class="icon" data-icon="target"></span> Evaluar compatibilidad</button>
            <button class="btn secondary" type="button" id="btnCancelar">Cancelar</button>
          </div>
          <div id="preview" style="margin-top:14px"></div>
        </form>
      </div>

      <div class="grid cols-3" style="margin:16px 0">
        <div class="card"><h2>Mis actividades</h2><p class="muted" id="kpiTotal">—</p></div>
        <div class="card"><h2>Confiabilidad</h2><p class="muted"><span id="kpiConf">—</span></p></div>
        <div class="card"><h2>Reputación / Sello</h2><p class="muted"><span id="kpiRep">—</span> <span id="kpiSello"></span></p></div>
      </div>

      <div class="row" style="margin-bottom:16px">
        <button class="btn secondary" id="btnReporte"><span class="icon" data-icon="download"></span> Descargar reporte de impacto (PDF)</button>
      </div>

      <h2>Tus actividades</h2>
      <div id="misActividades"><div class="placeholder">Cargando…</div></div>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/ui-toast.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app-boot.js"></script>
  <script src="js/filters.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales-all.global.min.js"></script>
  <script src="js/calendar-view.js"></script>
  <script src="js/match-calculator.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      let user = null;
      try { ({ user } = await api.get("/api/auth/me")); } catch (_) {}
      if (!user) return;

      const cat = await Filters.cargar();
      Filters.poblarSelect(document.getElementById("aCarrera"), cat.carreras, "id", "nombre");
      Filters.poblarSelect(document.getElementById("aNivel"), cat.generaciones, "nivel", "etiqueta");

      const formCard = document.getElementById("formCard");
      document.getElementById("btnNueva").onclick = () => (formCard.hidden = !formCard.hidden);
      document.getElementById("btnCancelar").onclick = () => (formCard.hidden = true);

      function payloadFrom(form) {
        const d = Object.fromEntries(new FormData(form).entries());
        return {
          titulo: d.titulo, descripcion: d.descripcion, tipo: d.tipo, ubicacion: d.ubicacion,
          fechaInicio: d.fechaInicio, fechaFin: d.fechaFin,
          publico: [{ carreraId: +d.carreraId, nivel: +d.nivel }],
        };
      }

      document.getElementById("btnPreview").onclick = async () => {
        const d = Object.fromEntries(new FormData(document.getElementById("actForm")).entries());
        if (!d.fechaInicio || !d.carreraId) return toast("Completa fecha y carrera", "error");
        try {
          const r = await api.post("/api/match/evaluar", {
            inicio: d.fechaInicio, fin: d.fechaFin || d.fechaInicio,
            publico: [{ carreraId: +d.carreraId, nivel: +d.nivel }],
          });
          MatchCalculator.render(document.getElementById("preview"), r);
        } catch (err) { toast(err.message, "error"); }
      };

      document.getElementById("actForm").onsubmit = async (e) => {
        e.preventDefault();
        try {
          await api.post("/api/actividades", payloadFrom(e.target));
          toast("Actividad creada", "success");
          formCard.hidden = true; e.target.reset();
          cargarLista();
        } catch (err) { toast(err.message, "error"); }
      };

      const btnReporte = document.getElementById("btnReporte");
      btnReporte.onclick = () => {
        if (user.entidadId) window.open("/api/reports/" + user.entidadId + "/pdf", "_blank");
        else toast("Solo las entidades aportantes tienen reporte", "error");
      };

      async function cargarLista() {
        if (user.entidadId) {
          CalendarView.montar(document.getElementById("misActividades"), { entidadId: user.entidadId });
          try {
            const acts = await api.get("/api/actividades?entidadId=" + user.entidadId);
            document.getElementById("kpiTotal").textContent = acts.length + " actividad(es)";
          } catch (_) {}
          try {
            const resumen = await api.get("/api/entidades/" + user.entidadId + "/resumen");
            document.getElementById("kpiConf").textContent = resumen.confiabilidad_pct + "%";
            document.getElementById("kpiRep").textContent = resumen.reputacion + " pts";
            document.getElementById("kpiSello").innerHTML = resumen.sello_coordinacion
              ? '<span class="badge alto">' + Icon("trophy", { size: 14 }) + " Sello</span>" : "";
          } catch (_) {}
        } else {
          document.getElementById("misActividades").innerHTML =
            '<div class="placeholder">Eres ADMIN. Gestiona desde <a href="admin.html">Admin</a> y revisa <a href="kpis.html">KPIs</a>.</div>';
          document.getElementById("kpiConf").textContent = "—";
          document.getElementById("kpiRep").textContent = "—";
        }
      }
      cargarLista();
    });
  </script>
</body>
</html>
