services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # IMPORTANTE: dentro de la red de compose, la BD se alcanza por el NOMBRE
      # del servicio ('db') en el puerto interno 5432 — NO por localhost ni por
      # el puerto publicado al host (${POSTGRES_PORT}). Por eso construimos el
      # DATABASE_URL aca en vez de heredar ${DATABASE_URL} del .env, que esta
      # pensado para `npm start` en el host (localhost:${POSTGRES_PORT}).
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      # NODE_ENV configurable (default 'development' para docker LOCAL):
      #   - development → cookies de sesion sin `secure` → el login funciona
      #     por http://localhost (sin HTTPS), que es como se prueba en local.
      #   - production  → cookies `secure`+`sameSite=none` (requiere HTTPS).
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - ${PORT}:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - node_modules:/app/node_modules

volumes:
  db:
  node_modules:
